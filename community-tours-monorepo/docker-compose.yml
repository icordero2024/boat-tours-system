services:
  tours-service:
    build:
      context: ./backend/tours-service
    container_name: tours-service
    ports:
      - "8081:8081"
    volumes:
      - tours-data:/app/data

  guides-service:
    build:
      context: ./backend/guides-service
    container_name: guides-service
    ports:
      - "8082:8082"
    volumes:
      - guides-data:/app/data

  frontend:
    image: node:20-alpine
    container_name: community-tours-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_TOURS_API_URL: http://localhost:8081
      VITE_GUIDES_API_URL: http://localhost:8082
    volumes:
      - ./frontend:/app
    depends_on:
      - tours-service
      - guides-service

volumes:
  tours-data:
  guides-data:
